<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AICスロットマシン</title>
    <link rel="icon" type="image/png" href="app_logo.png" />
    <link rel="apple-touch-icon" href="app_logo.png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-title" aria-label="AICスロット">
          <h1 class="sr-only">AICスロット</h1>
          <span class="brand-image-frame brand-wordmark">
            <img src="aic_logo.png" alt="AIC Keio University" />
          </span>
        </div>
      </header>

      <section class="workspace" aria-label="抽選アプリ">
        <aside class="setup-panel">
          <div class="panel-heading">
            <h2>番号登録</h2>
            <button class="icon-button ghost" id="clearAllButton" type="button" title="全データを初期化" aria-label="全データを初期化">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18" />
                <path d="M8 6V4h8v2" />
                <path d="M6 6l1 15h10l1-15" />
                <path d="M10 11v6" />
                <path d="M14 11v6" />
              </svg>
            </button>
          </div>

          <label class="field-label" for="ticketInput">整理券番号</label>
          <textarea id="ticketInput" spellcheck="false" placeholder="例&#10;001&#10;002&#10;003&#10;または 1, 2, 3"></textarea>

          <div class="range-row">
            <label>
              <span>開始</span>
              <input id="rangeStart" type="text" inputmode="numeric" placeholder="001" />
            </label>
            <label>
              <span>終了</span>
              <input id="rangeEnd" type="text" inputmode="numeric" placeholder="120" />
            </label>
            <button class="secondary-button" id="addRangeButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14" />
                <path d="M5 12h14" />
              </svg>
              範囲追加
            </button>
          </div>

          <div class="button-row">
            <button class="primary-button" id="applyButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M20 6L9 17l-5-5" />
              </svg>
              抽選対象に反映
            </button>
            <button class="secondary-button" id="sampleButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 19.5V6a2 2 0 0 1 2-2h12v16H6a2 2 0 0 1-2-.5Z" />
                <path d="M8 8h7" />
                <path d="M8 12h6" />
              </svg>
              サンプル
            </button>
          </div>

          <p class="message" id="inputMessage" role="status"></p>
        </aside>

        <section class="slot-panel">
          <div class="slot-machine" aria-live="polite">
            <div class="machine-light left"></div>
            <div class="machine-light right"></div>
            <div class="reel-window" id="reelWindow">
              <span class="reel-number" id="slotNumber">---</span>
            </div>
            <p class="draw-label" id="drawLabel">抽選待機中</p>
          </div>

          <div class="draw-actions">
            <button class="draw-button" id="drawButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true" id="drawIcon">
                <path d="M5 3l14 9-14 9V3Z" />
              </svg>
              <span id="drawButtonLabel">抽選開始</span>
            </button>
            <button class="secondary-button" id="undoButton" type="button" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 14 4 9l5-5" />
                <path d="M4 9h10a6 6 0 1 1 0 12h-3" />
              </svg>
              直前を取消
            </button>
            <button class="secondary-button" id="exportButton" type="button" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 3v12" />
                <path d="m7 10 5 5 5-5" />
                <path d="M5 21h14" />
              </svg>
              CSV出力
            </button>
            <button class="secondary-button" id="winnerSummaryButton" type="button" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 6h13" />
                <path d="M8 12h13" />
                <path d="M8 18h13" />
                <path d="M3 6h.01" />
                <path d="M3 12h.01" />
                <path d="M3 18h.01" />
              </svg>
              一覧
            </button>
            <button class="secondary-button anthem-control-button" id="anthemToggleButton" type="button" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true" id="anthemToggleIcon">
                <path d="M8 5v14l11-7-11-7Z" />
              </svg>
              <span id="anthemToggleLabel">再生/停止</span>
            </button>
            <button class="secondary-button anthem-restart-button" id="anthemRestartButton" type="button" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4 4v6h6" />
                <path d="M20 20v-6h-6" />
                <path d="M20 10a8 8 0 0 0-13.7-5.7L4 10" />
                <path d="M4 14a8 8 0 0 0 13.7 5.7L20 14" />
              </svg>
              最初から流す
            </button>
            <input class="sr-only" id="anthemInput" type="file" accept="audio/*" />
            <button class="secondary-button" id="anthemButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 18V5l12-2v13" />
                <circle cx="6" cy="18" r="3" />
                <circle cx="18" cy="16" r="3" />
              </svg>
              応援歌音源
            </button>
          </div>
        </section>

        <section class="history-panel">
          <div class="panel-heading">
            <h2>当選履歴</h2>
            <button class="icon-button ghost" id="clearHistoryButton" type="button" title="履歴をクリア" aria-label="履歴をクリア" disabled>
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 6h18" />
                <path d="M8 6V4h8v2" />
                <path d="M6 6l1 15h10l1-15" />
              </svg>
            </button>
          </div>
          <ol class="winner-list" id="winnerList" aria-live="polite"></ol>
        </section>
      </section>
    </main>

    <div class="slot-fx-layer" id="slotFxLayer" aria-hidden="true">
      <div class="keio-pageantry">
        <span class="victory-ribbon ribbon-left"></span>
        <span class="victory-ribbon ribbon-right"></span>
        <span class="gold-spark spark-a"></span>
        <span class="gold-spark spark-b"></span>
        <span class="gold-spark spark-c"></span>
        <span class="gold-spark spark-d"></span>
        <span class="gold-spark spark-e"></span>
        <span class="gold-spark spark-f"></span>
      </div>
      <div class="dance-field">
        <img class="dance-mascot mascot-a" src="aic_mascots.png" alt="" />
        <img class="dance-mascot mascot-b" src="aic_mascots.png" alt="" />
        <img class="dance-mascot mascot-c" src="aic_mascots.png" alt="" />
        <img class="dance-mascot mascot-d" src="aic_mascots.png" alt="" />
        <span class="casino-chip chip-a"></span>
        <span class="casino-chip chip-b"></span>
        <span class="casino-chip chip-c"></span>
        <span class="casino-chip chip-d"></span>
        <span class="casino-chip chip-e"></span>
      </div>
      <div class="impact-scene">
        <div class="impact-shadow"></div>
        <span class="confetti-cannon cannon-left primary-burst"></span>
        <span class="confetti-cannon cannon-left secondary-burst"></span>
        <span class="confetti-cannon cannon-right primary-burst"></span>
        <span class="confetti-cannon cannon-right secondary-burst"></span>
        <img class="impact-mascot impact-mascot-left" src="aic_mascots.png" alt="" />
        <img class="impact-mascot impact-mascot-right" src="aic_mascots.png" alt="" />
        <span class="impact-dust dust-a"></span>
        <span class="impact-dust dust-b"></span>
        <span class="impact-dust dust-c"></span>
        <span class="impact-dust dust-d"></span>
      </div>
    </div>

    <div class="winner-modal" id="winnerSummaryModal" role="dialog" aria-modal="true" aria-labelledby="winnerSummaryTitle" hidden>
      <div class="winner-modal-backdrop"></div>
      <section class="winner-modal-panel">
        <div class="winner-modal-header">
          <h2 id="winnerSummaryTitle">当選者リスト</h2>
          <button class="icon-button ghost" id="winnerSummaryCloseButton" type="button" title="一覧を閉じる" aria-label="一覧を閉じる">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M18 6 6 18" />
              <path d="m6 6 12 12" />
            </svg>
          </button>
        </div>
        <div class="winner-summary-grid" id="winnerSummaryGrid" aria-label="当選番号一覧"></div>
      </section>
    </div>

    <template id="winnerItemTemplate">
      <li>
        <span class="winner-rank"></span>
        <strong class="winner-number"></strong>
        <time class="winner-time"></time>
        <button class="icon-button" type="button" title="この番号を履歴から戻す" aria-label="この番号を履歴から戻す">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12a9 9 0 1 0 3-6.7" />
            <path d="M3 3v6h6" />
          </svg>
        </button>
      </li>
    </template>

    <script src="app.js"></script>
  </body>
</html>
